AWSTemplateFormatVersion: '2010-09-09'
Description: ☕ Charlie Cafe EC2 Dev Server (Amazon Linux 2023)

Parameters:

  KeyPairName:
    Description: Select an existing EC2 KeyPair
    Type: AWS::EC2::KeyPair::KeyName

  VpcId:
    Description: Select VPC
    Type: AWS::EC2::VPC::Id

  SubnetId:
    Description: Select Public Subnet
    Type: AWS::EC2::Subnet::Id

  MyIP:
    Description: Your IP for SSH access (e.g. 1.2.3.4/32)
    Type: String

Resources:

# ----------------------------------------------------------
# 🔐 Security Group
# ----------------------------------------------------------
  CafeSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH and HTTP
      VpcId: !Ref VpcId

      SecurityGroupIngress:

        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref MyIP

        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

# ----------------------------------------------------------
# 🖥️ EC2 Instance
# ----------------------------------------------------------
  CafeDevWebServer:
    Type: AWS::EC2::Instance
    Properties:

      InstanceType: t2.micro

      ImageId: ami-0c02fb55956c7d316  # ⚠️ Replace with Amazon Linux 2023 AMI for your region

      KeyName: !Ref KeyPairName

      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          SubnetId: !Ref SubnetId
          GroupSet:
            - !Ref CafeSecurityGroup

      Tags:
        - Key: Name
          Value: CafeDevWebServer

# ----------------------------------------------------------
# 🚀 USER DATA (Your Script)
# ----------------------------------------------------------
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -e

          echo "🚀 Starting EC2 Bootstrap..."

          dnf update -y

          dnf remove -y curl-minimal || true
          dnf install -y curl --allowerasing

          dnf install -y \
            git docker jq unzip wget nano vim htop tar awscli mariadb105

          systemctl enable docker
          systemctl start docker

          usermod -aG docker ec2-user

          mkdir -p /usr/local/lib/docker/cli-plugins/

          curl -SL https://github.com/docker/compose/releases/latest/download/docker-compose-linux-x86_64 \
            -o /usr/local/lib/docker/cli-plugins/docker-compose

          chmod +x /usr/local/lib/docker/cli-plugins/docker-compose

          mkdir -p /home/ec2-user/.ssh
          ssh-keyscan github.com >> /home/ec2-user/.ssh/known_hosts
          chown -R ec2-user:ec2-user /home/ec2-user/.ssh

          echo "✅ EC2 Bootstrap completed"

Outputs:

  InstancePublicIP:
    Description: Public IP of EC2
    Value: !GetAtt CafeDevWebServer.PublicIp