<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>☕ Charlie Cafe Smart Link Generator</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

<style>
/* ===============================
   🌍 GLOBAL STYLE (CAFE THEME)
================================ */
body {
  font-family: 'Segoe UI', sans-serif;
  background: url('https://images.unsplash.com/photo-1509042239860-f550ce710b93') no-repeat center center fixed;
  background-size: cover;
}

/* Light overlay for readability */
.overlay {
  background: rgba(255,248,240,0.93);
  min-height: 100vh;
  padding: 30px;
}

/* Header */
.header {
  background: #d35400;
  color: white;
  padding: 20px;
  border-radius: 12px;
  text-align: center;
  font-size: 1.5rem;
  margin-bottom: 25px;
}

/* Cards */
.card {
  border-radius: 12px;
  margin-bottom: 20px;
}

.card-header {
  background: #e67e22;
  color: white;
  font-weight: bold;
}

/* Buttons */
.btn-main {
  background: #d35400;
  color: white;
}

.btn-copy {
  margin-left: 8px;
}

/* Small preview icon */
.preview-link {
  margin-left: 8px;
  color: #333;
}
</style>
</head>

<body>
<div class="overlay container">

<!-- ===============================
     ☕ HEADER
================================ -->
<div class="header">
  <i class="fas fa-mug-hot"></i> Charlie Cafe Smart Link Generator
</div>

<!-- ===============================
     🔧 INPUT SECTION
================================ -->
<div class="card">
  <div class="card-header">
    <i class="fas fa-gear"></i> Configuration
  </div>
  <div class="card-body">

    <!-- CloudFront Input -->
    <label>CloudFront Endpoint</label>
    <input type="text" id="cloudfront" class="form-control mb-3"
      placeholder="https://xxxxx.cloudfront.net">

    <!-- Cognito Domain -->
    <label>Cognito Domain</label>
    <input type="text" id="domain" class="form-control mb-3"
      placeholder="https://xxxx.auth.us-east-1.amazoncognito.com">

    <!-- Client ID -->
    <label>Client ID</label>
    <input type="text" id="clientId" class="form-control mb-3"
      placeholder="Enter Client ID">

    <!-- Generate Button -->
    <div class="text-center mt-3">
      <button class="btn btn-main btn-lg" onclick="generateAllLinks()">
        <i class="fas fa-bolt"></i> Generate All Links
      </button>
    </div>

  </div>
</div>

<!-- ===============================
     ☁️ CLOUDFRONT OUTPUT
================================ -->
<div class="card">
  <div class="card-header">
    <i class="fas fa-cloud"></i> CloudFront Links
  </div>
  <div class="card-body">
    <ul id="cfLinks" class="list-group"></ul>
  </div>
</div>

<!-- ===============================
     🔐 COGNITO OUTPUT
================================ -->
<div class="card">
  <div class="card-header">
    <i class="fas fa-user-shield"></i> Cognito Login Links
  </div>
  <div class="card-body">
    <ul id="cognitoLinks" class="list-group"></ul>
  </div>
</div>

</div>

<!-- ===============================
     ⚙️ JAVASCRIPT LOGIC
================================ -->
<script>

/* ============================================
   📌 STATIC PAGES LIST (AUTO GENERATE)
============================================ */
const pages = [
  "/login.html",
  "/cafe-admin-dashboard.html",
  "/order-status.html",
  "/admin-orders.html",
  "/analytics.html",
  "/employee-portal.html",
  "/employee-login.html",
  "/hr-attendance.html",
  "/checkin.html",
  "/logout.php?loggedout=true"
];

/* ============================================
   🚀 MAIN FUNCTION (ONE BUTTON)
============================================ */
function generateAllLinks() {

  // Get user inputs
  const base = document.getElementById("cloudfront").value.trim();
  const domain = document.getElementById("domain").value.trim();
  const clientId = document.getElementById("clientId").value.trim();

  // Validate input
  if(!base || !domain || !clientId){
    alert("⚠️ Please fill all fields!");
    return;
  }

  // Output containers
  const cfOutput = document.getElementById("cfLinks");
  const cognitoOutput = document.getElementById("cognitoLinks");

  // Clear old data
  cfOutput.innerHTML = "";
  cognitoOutput.innerHTML = "";

  /* ============================================
     ☁️ GENERATE CLOUDFRONT LINKS
  ============================================ */
  pages.forEach(page => {

    const url = base + page;

    const li = document.createElement("li");
    li.className = "list-group-item d-flex justify-content-between align-items-center flex-wrap";

    li.innerHTML = `
      <span>${url}</span>
      <div>
        <a href="${url}" target="_blank" class="preview-link">
          <i class="fas fa-external-link-alt"></i>
        </a>
        <button class="btn btn-sm btn-outline-primary btn-copy"
          onclick="copyText('${url}')">
          <i class="fas fa-copy"></i> Copy
        </button>
      </div>
    `;

    cfOutput.appendChild(li);
  });

  /* ============================================
     🔐 GENERATE COGNITO LOGIN LINKS
     ONLY FOR:
     - login.html
     - employee-login.html
  ============================================ */

  const loginPages = [
    "/login.html",
    "/employee-login.html"
  ];

  loginPages.forEach(page => {

    const redirect = base + page;

    const cognitoURL =
      `${domain}/login?client_id=${clientId}` +
      `&response_type=code` +
      `&scope=openid+email+profile` +
      `&redirect_uri=${encodeURIComponent(redirect)}`;

    const li = document.createElement("li");
    li.className = "list-group-item d-flex justify-content-between align-items-center flex-wrap";

    li.innerHTML = `
      <span>${cognitoURL}</span>
      <div>
        <a href="${cognitoURL}" target="_blank" class="preview-link">
          <i class="fas fa-external-link-alt"></i>
        </a>
        <button class="btn btn-sm btn-outline-primary btn-copy"
          onclick="copyText('${cognitoURL}')">
          <i class="fas fa-copy"></i> Copy
        </button>
      </div>
    `;

    cognitoOutput.appendChild(li);
  });

}

/* ============================================
   📋 COPY FUNCTION (REUSABLE)
============================================ */
function copyText(text){
  navigator.clipboard.writeText(text)
    .then(() => alert("✅ Copied to clipboard!"));
}

</script>

</body>
</html>
