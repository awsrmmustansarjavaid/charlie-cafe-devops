<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Charlie Café ☕ | Admin Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- =====================================================
     BOOTSTRAP + GOOGLE FONT
===================================================== -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
/* =====================================================
   CHARLIE CAFÉ LOGIN UI DESIGN
===================================================== */

body {
    font-family: 'Poppins', sans-serif;
    background: url('https://images.unsplash.com/photo-1509042239860-f550ce710b93') no-repeat center center/cover;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Dark overlay */
.overlay{
    background: rgba(0,0,0,0.6);
    position:absolute;
    width:100%;
    height:100%;
}

/* Login card */
.login-card{
    position:relative;
    background: rgba(58,37,28,0.95);
    padding:40px;
    border-radius:20px;
    width:350px;
    text-align:center;
    color:#fff;
    z-index:2;
    box-shadow:0 15px 35px rgba(0,0,0,0.6);
}

.logo{
    font-size:40px;
    margin-bottom:10px;
}

.cafe-title{
    font-size:26px;
    font-weight:700;
    margin-bottom:25px;
}

/* Login button */
.btn-login{
    background: linear-gradient(135deg,#ff5722,#ff9800);
    border:none;
    border-radius:50px;
    padding:12px;
    font-weight:600;
    width:100%;
    color:#fff;
    cursor:pointer;
    transition:0.3s;
}

.btn-login:hover{
    transform:scale(1.05);
}
</style>
</head>

<body>

<div class="overlay"></div>

<div class="login-card">

    <div class="logo">☕</div>
    <div class="cafe-title">Charlie Café Admin</div>

    <p class="mb-4">Login to manage café operations.</p>

    <!-- LOGIN BUTTON -->
    <button id="loginBtn" class="btn btn-login">
        Login with Cognito
    </button>

</div>

<!-- =====================================================
     LOAD GLOBAL CONFIG (IMPORTANT)
===================================================== -->
<script src="/js/config.js"></script>

<script>

/* =========================================================
   CHARLIE CAFÉ ☕ ADMIN LOGIN
   ---------------------------------------------------------
   This script performs:

   1️⃣ Redirect user to Cognito Hosted UI
   2️⃣ Receive Authorization Code after login
   3️⃣ Exchange Code → Tokens
   4️⃣ Store Tokens in sessionStorage
   5️⃣ Redirect to Admin Dashboard
========================================================= */


/* =========================================================
   1️⃣ LOAD VALUES FROM CONFIG.JS
========================================================= */

const DOMAIN = window.CHARLIE_CONFIG.COGNITO_DOMAIN;
const CLIENT_ID = window.CHARLIE_CONFIG.CLIENT_ID;
const CLOUDFRONT_BASE = window.CHARLIE_CONFIG.CLOUDFRONT_BASE;

/*
Example config.js

window.CHARLIE_CONFIG = {
    REGION: "us-east-1",
    CLIENT_ID: "xxxxx",
    COGNITO_DOMAIN: "https://yourdomain.auth.us-east-1.amazoncognito.com",
    CLOUDFRONT_BASE: "https://dxxxxx.cloudfront.net"
}
*/


/* =========================================================
   2️⃣ DEFINE REDIRECT URL
   MUST MATCH COGNITO APP CLIENT CALLBACK
========================================================= */

const REDIRECT_URI = CLOUDFRONT_BASE + "/login.html";


/* =========================================================
   3️⃣ ADMIN DASHBOARD AFTER LOGIN
========================================================= */

const AFTER_LOGIN = CLOUDFRONT_BASE + "/cafe-admin-dashboard.html";


/* =========================================================
   4️⃣ BUILD COGNITO LOGIN URL
========================================================= */

const SCOPE = encodeURIComponent("openid email profile");

const loginUrl =
`${DOMAIN}/login?client_id=${CLIENT_ID}
&response_type=code
&scope=${SCOPE}
&redirect_uri=${encodeURIComponent(REDIRECT_URI)}`;


/* =========================================================
   5️⃣ LOGIN BUTTON CLICK → REDIRECT TO COGNITO
========================================================= */

document.getElementById("loginBtn").addEventListener("click", () => {

    console.log("Redirecting to Cognito:", loginUrl);

    window.location.href = loginUrl;

});


/* =========================================================
   6️⃣ HANDLE REDIRECT FROM COGNITO
   Example URL after login:

   login.html?code=xxxxxxxx
========================================================= */

const urlParams = new URLSearchParams(window.location.search);
const code = urlParams.get("code");


/* =========================================================
   7️⃣ EXCHANGE AUTHORIZATION CODE FOR TOKENS
========================================================= */

if (code) {

    async function exchangeCodeForToken(){

        const tokenUrl = `${DOMAIN}/oauth2/token`;

        const data = new URLSearchParams();

        data.append("grant_type","authorization_code");
        data.append("client_id",CLIENT_ID);
        data.append("code",code);
        data.append("redirect_uri",REDIRECT_URI);

        try{

            const response = await fetch(tokenUrl,{
                method:"POST",
                headers:{
                    "Content-Type":"application/x-www-form-urlencoded"
                },
                body:data.toString()
            });

            if(!response.ok){
                throw new Error("Token exchange failed");
            }

            const tokens = await response.json();

            /* =====================================================
               8️⃣ STORE TOKENS
            ===================================================== */

            sessionStorage.setItem("cognitoAccessToken",tokens.access_token);
            sessionStorage.setItem("cognitoIdToken",tokens.id_token);
            sessionStorage.setItem("cognitoRefreshToken",tokens.refresh_token);


            /* =====================================================
               9️⃣ CLEAN URL (?code=...)
            ===================================================== */

            window.history.replaceState({},document.title,REDIRECT_URI);


            /* =====================================================
               🔟 REDIRECT TO ADMIN DASHBOARD
            ===================================================== */

            window.location.href = AFTER_LOGIN;

        }

        catch(error){

            console.error("Login Error:",error);
            alert("Login failed: " + error.message);

        }

    }

    exchangeCodeForToken();
}

</script>

</body>
</html>
